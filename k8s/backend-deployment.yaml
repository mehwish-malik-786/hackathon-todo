# =============================================================================
# Phase IV: Backend Deployment with Dapr Sidecar
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: todo-dev
  labels:
    app: backend
    version: v1
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: todo-app
  annotations:
    dapr.io/enabled: "true"
    dapr.io/app-id: "backend"
    dapr.io/app-port: "7860"
    dapr.io/enabled-metrics: "true"
    dapr.io/metrics-port: "9090"
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        version: v1
        app.kubernetes.io/name: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "backend"
        dapr.io/app-port: "7860"
    spec:
      serviceAccountName: todo-app-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: backend
        image: python:3.12-slim
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - pip install --no-cache-dir --target=/opt/packages fastapi uvicorn pydantic sqlalchemy sqlmodel pydantic-settings python-multipart python-dotenv aiofiles psycopg2-binary &&
            export PYTHONPATH=/opt/packages:$PYTHONPATH &&
            cd /app &&
            python -m uvicorn main:app --host 0.0.0.0 --port 7860
        workingDir: /app
        ports:
        - containerPort: 7860
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "7860"
        - name: DATABASE_URL
          value: "sqlite:///./todo.db"
        - name: ENVIRONMENT
          value: "development"
        - name: DAPR_HTTP_ENDPOINT
          value: "http://localhost:3500"
        - name: DAPR_GRPC_ENDPOINT
          value: "localhost:50001"
        - name: PYTHONPATH
          value: "/opt/packages:/app"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 7860
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 7860
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 7860
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: backend-main
          mountPath: /app
        - name: backend-routers
          mountPath: /app/routers
        - name: backend-models
          mountPath: /app/models
        - name: backend-schemas
          mountPath: /app/schemas
        - name: backend-repositories
          mountPath: /app/repositories
        - name: backend-services
          mountPath: /app/services
        - name: packages-volume
          mountPath: /opt/packages
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: backend-main
        configMap:
          name: backend-code
      - name: backend-routers
        configMap:
          name: backend-routers
      - name: backend-models
        configMap:
          name: backend-models
      - name: backend-schemas
        configMap:
          name: backend-schemas
      - name: backend-repositories
        configMap:
          name: backend-repositories
      - name: backend-services
        configMap:
          name: backend-services
      - name: packages-volume
        emptyDir: {}
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: todo-dev
  labels:
    app: backend
    app.kubernetes.io/name: backend
spec:
  type: ClusterIP
  ports:
  - port: 7860
    targetPort: 7860
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: backend
---
# Backend Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: todo-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
---
# Backend Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-network-policy
  namespace: todo-dev
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 7860
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: kafka
    - podSelector:
        matchLabels:
          app: redis
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 9092
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 443
---
# Backend Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: todo-dev
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
