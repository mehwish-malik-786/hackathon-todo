{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.namespace.name }}
  labels:
    app: frontend
    version: v1
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: todo-app
  annotations:
    dapr.io/enabled: {{ .Values.global.daprEnabled | quote }}
    dapr.io/app-id: "frontend"
    dapr.io/app-port: {{ .Values.frontend.env.PORT | quote }}
    prometheus.io/scrape: {{ .Values.global.monitoring | quote }}
    prometheus.io/port: "9090"
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        version: v1
        app.kubernetes.io/name: frontend
      annotations:
        dapr.io/enabled: {{ .Values.global.daprEnabled | quote }}
        dapr.io/app-id: "frontend"
        dapr.io/app-port: {{ .Values.frontend.env.PORT | quote }}
    spec:
      serviceAccountName: todo-app-sa
      securityContext:
        {{- toYaml .Values.security.podSecurityContext | nindent 8 }}
      containers:
      - name: frontend
        image: {{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.frontend.env.PORT }}
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        {{- range $key, $value := .Values.frontend.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        securityContext:
          {{- toYaml .Values.security.containerSecurityContext | nindent 10 }}
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: {{ .Values.frontend.env.PORT }}
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: {{ .Values.frontend.env.PORT }}
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.namespace.name }}
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
  - port: {{ .Values.frontend.service.port }}
    targetPort: {{ .Values.frontend.env.PORT }}
    protocol: TCP
    name: http
  selector:
    app: frontend
{{- if .Values.frontend.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: {{ .Values.namespace.name }}
  annotations:
    {{- range $key, $value := .Values.frontend.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.frontend.ingress.className }}
  rules:
  - host: {{ .Values.frontend.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: {{ .Values.frontend.service.port }}
{{- end }}
{{- end }}
